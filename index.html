      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&display=swap');

      body {
        font-family: 'JetBrains Mono', monospace;
        background-color: #050505;
        color: #e5e5e5;
        overflow-x: hidden;
      }

      /* CRT Scanline Effect */
      .scanlines {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 1;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0),
          rgba(255, 255, 255, 0) 50%,
          rgba(0, 0, 0, 0.2) 50%,
          rgba(0, 0, 0, 0.2)
        );
        background-size: 100% 4px;
        animation: scrollScanlines 10s linear infinite;
      }

      .scanlines::before {
        content: " ";
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        background: linear-gradient(
          rgba(18, 16, 16, 0) 50%,
          rgba(0, 0, 0, 0.25) 50%
        ),
        linear-gradient(
          90deg,
          rgba(255, 0, 0, 0.06),
          rgba(0, 255, 0, 0.02),
          rgba(0, 0, 255, 0.06)
        );
        z-index: 2;
        background-size: 100% 2px, 3px 100%;
      }

      @keyframes scrollScanlines {
        0% { background-position: 0 0; }
        100% { background-position: 0 100%; }
      }

      /* Glitch Animation */
      .glitch {
        position: relative;
      }
      .glitch::before,
      .glitch::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      .glitch::before {
        left: 2px;
        text-shadow: -1px 0 #00ff00;
        clip: rect(24px, 550px, 90px, 0);
        animation: glitch-anim-2 3s infinite linear alternate-reverse;
      }
      .glitch::after {
        left: -2px;
        text-shadow: -1px 0 #ff00ff;
        clip: rect(85px, 550px, 140px, 0);
        animation: glitch-anim 2.5s infinite linear alternate-reverse;
      }

      @keyframes glitch-anim {
        0% { clip: rect(14px, 9999px, 127px, 0); }
        20% { clip: rect(93px, 9999px, 13px, 0); }
        40% { clip: rect(38px, 9999px, 86px, 0); }
        60% { clip: rect(69px, 9999px, 14px, 0); }
        80% { clip: rect(54px, 9999px, 114px, 0); }
        100% { clip: rect(24px, 9999px, 63px, 0); }
      }
      @keyframes glitch-anim-2 {
        0% { clip: rect(65px, 9999px, 106px, 0); }
        20% { clip: rect(32px, 9999px, 83px, 0); }
        40% { clip: rect(9px, 9999px, 19px, 0); }
        60% { clip: rect(104px, 9999px, 60px, 0); }
        80% { clip: rect(41px, 9999px, 73px, 0); }
        100% { clip: rect(87px, 9999px, 110px, 0); }
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a;
      }
      ::-webkit-scrollbar-thumb {
        background: #22c55e;
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4ade80;
      }

      @keyframes scan {
        0% { top: 0; }
        100% { top: 100%; }
      }
    </style>
